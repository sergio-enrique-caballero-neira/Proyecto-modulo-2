<video autoplay muted loop playsinline class="video-background">
  <source src="paquetecaja.mp4" type="video/mp4">
</video>
<div class="menu-crear">
  <h1>Enviar Paquete No Alimenticio</h1>
  <div class="contenedor-formulario">
    <form class="formulario-crear">
      <div class="fila-formulario">
        <h3>Descripción</h3>
        <input [(ngModel)]="descripcion" name="descripcion" type="text" class="form-control" placeholder="Herramientas..."/>
      </div>
      <div class="fila-formulario">
        <h3>Peso</h3>
        <input [(ngModel)]="peso" name="peso" type="number" min="0" class="form-control" placeholder="4"/>
      </div>
      <div class="fila-formulario">
        <h3>Origen</h3>
        <input [(ngModel)]="origen" name="origen" type="text" class="form-control" placeholder="Bogotá"/>
      </div>
      <div class="fila-formulario">
        <h3>Destino</h3>
        <input [(ngModel)]="destino" name="destino" type="text" class="form-control" placeholder="Cartagena"/>
      </div>
      <div class="fila-formulario">
        <h3>Fecha Envío</h3>
        <input [(ngModel)]="fechaEnvio" name="fechaEnvio" type="datetime-local" class="form-control" />
      </div>
      <div class="fila-formulario">
        <h3>Frágil</h3>
        <input [(ngModel)]="fragil" name="fragil" type="checkbox" class="form-check-input" />
      </div>
      <div class="acciones-formulario">
        <button (click)="crearPaqueteNoAlimenticio()" type="button" class="btn btn-success" [disabled]="creandoPaquete">{{ creandoPaquete ? 'Enviando...' : 'Enviar paquete' }}</button>
        <button type="button" class="botonlimpiar" (click)="limpiarFormulario()">Limpiar</button>
      </div>
    </form>
    <p class="mensaje-exito" *ngIf="mensajeExito">{{ mensajeExito }}</p>
    <p class="mensaje-error" *ngIf="mensajeError">{{ mensajeError }}</p>
  </div>
</div>
