<main class="main">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
  <div class="shape shape-4"></div>
  <div class="recuadro">
    <h1> Registro de Usuario </h1>

    <form class="formulario-crear">
      <div class="fila-formulario">
        <h3>Cedula</h3>
        <input [(ngModel)]="cedula" name="cedula" type="number" min="1000000000" class="form-control"/>
      </div>

      <div class="fila-formulario">
        <h3>Nombre</h3>
        <input [(ngModel)]="nombre" name="nombre" type="text" class="form-control"/>
      </div>

      <div class="fila-formulario">
        <h3>Email</h3>
        <input [(ngModel)]="email" name="email" type="email" class="form-control"/>
      </div>

      <div class="fila-formulario">
        <h3>Telefono</h3>
        <input [(ngModel)]="telefono" name="telefono" type="number" min="1" class="form-control"/>
      </div>

      <div class="fila-formulario">
        <h3>Edad</h3>
        <input [(ngModel)]="edad" name="edad" type="number" min="1" class="form-control"/>
      </div>

      <div class="fila-formulario">
        <h3>Direccion</h3>
        <input [(ngModel)]="direccion" name="direccion" type="text" class="form-control"/>
      </div>

      <div class="fila-formulario">
        <h3>Tipo de usuario</h3>
        <input [(ngModel)]="tipoUsuario" name="tipoUsuario" type="text" class="form-control" [disabled]="true"/>
      </div>

      <div class="fila-formulario">
        <h3>Contraseña</h3>
        <input [(ngModel)]="contrasena" name="contrasena" type="password" class="form-control"/>
      </div>

      <div class="acciones-formulario">
        <button (click)="crearUsuarioNormal()" type="button" class="btn btn-success" [disabled]="creandoUsuario">
          {{ creandoUsuario ? 'Registrando...' : 'Registrar usuario' }}
        </button>
        <button type="button" class="btn btn-outline-secondary" (click)="limpiarFormulario()">Limpiar</button>
      </div>
      <p class="mensaje-exito" *ngIf="mensajeExito">{{ mensajeExito }}</p>
      <p class="mensaje-error" *ngIf="mensajeError">{{ mensajeError }}</p>
    </form>

    <div class="boton-registro">
      <button (click)="crearUsuarioNormal()" type="button" class="btn btn-outline-info">Registrarse</button>
    </div>
    <p>¿Ya tiene una cuenta? <a routerLink="/login"> Iniciar Sesión</a></p>
  </div>
</main>
