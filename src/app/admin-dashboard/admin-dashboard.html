<main class="main" *ngIf="cargado">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
  <div class="shape shape-4"></div>
  <div class="recuadro">

    <div class="encabezado">
      <h1><i class="fa-regular fa-circle-user icono"></i> <p>{{nombre}}</p> <i class="fa-regular fa-id-card icono"></i> <p>id: {{id}}</p> <i class="fa-solid fa-at icono"></i> <p>{{tipoAdministrativo}}</p> </h1>
      <button type="button" class="btn btn-danger boton-salir"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
    </div>
  </div>
</main>

<div *ngIf="!cargado" class="d-flex justify-content-center align-items-center" style="height: 100vh;">
  <div class="spinner-border text-info" role="status">
    <span class="visually-hidden">Cargando...</span>
  </div>
</div>
